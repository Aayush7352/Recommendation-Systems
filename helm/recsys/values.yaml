global:
  environment: production
  imagePullPolicy: IfNotPresent

backend:
  image: ghcr.io/aayush7352/recsys-backend:latest
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  env:
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
    QDRANT_HOST: "qdrant"
    QDRANT_PORT: "6333"
  persistence:
    size: 20Gi

frontend:
  image: ghcr.io/aayush7352/recsys-frontend:latest
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  env:
    NEXT_PUBLIC_API_URL: "http://backend:8000"

qdrant:
  image: qdrant/qdrant:v1.13.0
  port: 6333
  grpcPort: 6334
  persistence:
    size: 10Gi

mlflow:
  image: ghcr.io/mlflow/mlflow:v2.17.0
  port: 5000
  persistence:
    size: 5Gi

monitoring:
  prometheus:
    enabled: true
    port: 9090
  grafana:
    enabled: true
    port: 3001
    adminPassword: admin

ingress:
  enabled: true
  host: recsys.example.com
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: recsys-tls
